name: Destroy Infra
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  codevalidate:
    name: "Verifica o código Terraform"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform init -backend=false
      - run: terraform validate

  destroy:
    name: "Executa Terraform Destroy"
    runs-on: ubuntu-latest
    needs: [codevalidate]

    env:
      TF_VAR_chave_ssh: ${{ github.ref == 'refs/heads/production' && secrets.CHAVE_PROD || secrets.CHAVE_STAG }}
      AWS_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
      TF_VAR_bloco_ips_liberados: ${{ secrets.IPS_PERMITIDOS }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Criar arquivo de backend
        run: |
          cat <<EOF > backend-config.tfvars
          ${{ secrets.BACKEND_CONFIG }}
          EOF

      - name: Terraform Init
        run: terraform init -backend-config="backend-config.tfvars"
 
      - name: Selecionar Workspace Adaptável
        run: |
          # Define o workspace baseado na branch atual
          WORKSPACE=${{ github.ref == 'refs/heads/production' && 'prod' || 'stag' }}
          echo "Selecionando workspace: $WORKSPACE"
          terraform workspace select $WORKSPACE || terraform workspace new $WORKSPACE
          
      - name: Terraform Destroy
        run: terraform destroy -auto-approve